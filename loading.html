    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F172A;
            --secondary: #64748B;
            --accent: #E8A020;
            --accent-hover: #D98220;
            --bg: #FDFCFB;
            --bg-alt: #F8FAFC;
            --border: rgba(15, 23, 42, 0.08);
            --border-hover: rgba(15, 23, 42, 0.2);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            --font-serif: 'Playfair Display', 'Georgia', serif;
            
            /* Emblem Colors */
            --c-summer: #FAC775;
            --c-winter: #85B7EB;
            --c-autumn: #D85A30;
            --c-spring: #D4537E;
            --c-botanical: #5DCAA5;
            --c-nature: #639922;
            --c-cities: #7F00FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Auth Gate --- */
        .auth-gate {
            background: white;
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(43,43,43,0.06);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .auth-gate.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            position: absolute;
        }

        .auth-gate h1 {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-gate p {
            color: var(--secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .auth-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #3E5C76;
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-btn:hover {
            background: #2E4A63;
            transform: translateY(-2px);
        }

        /* --- Loading Sequence --- */
        .loading-sequence {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .loading-sequence.active {
            opacity: 1;
        }

        .emblem-container {
            font-size: 4rem;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .emblem {
            position: absolute;
            opacity: 0;
            transform: scale(0.8);
            filter: blur(4px);
        }

        /* The active class triggers the specific animation */
        .emblem.active {
            opacity: 1;
            filter: blur(0);
        }

        /* Emblem specific animations (triggered when .active is added) */
        .emblem[data-emblem="summer"].active {
            animation: animSummer 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animSummer {
            0% { transform: scale(0.8); filter: drop-shadow(0 0 0 transparent); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--c-summer)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--c-summer)); }
        }

        .emblem[data-emblem="winter"].active {
            animation: animWinter 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animWinter {
            0% { transform: scale(0.8) rotate(-10deg); filter: drop-shadow(0 0 0 transparent); }
            50% { transform: scale(1) rotate(5deg); filter: drop-shadow(0 0 15px var(--c-winter)); }
            100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 8px var(--c-winter)); }
        }

        .emblem[data-emblem="autumn"].active {
            animation: animAutumn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animAutumn {
            0% { transform: translateY(10px) scale(0.8); filter: drop-shadow(0 0 0 transparent); }
            50% { transform: translateY(-5px) scale(1.05); filter: drop-shadow(0 0 15px var(--c-autumn)); }
            100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 8px var(--c-autumn)); }
        }

        .emblem[data-emblem="spring"].active {
            animation: animSpring 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animSpring {
            0% { transform: scale(0.5); opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 12px var(--c-spring)); }
        }

        .emblem[data-emblem="botanical"].active {
            animation: animBotanical 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animBotanical {
            0% { transform: rotate(-15deg) scale(0.8); filter: drop-shadow(0 0 0 transparent); }
            50% { transform: rotate(10deg) scale(1.05); filter: drop-shadow(0 0 15px var(--c-botanical)); }
            100% { transform: rotate(0) scale(1); filter: drop-shadow(0 0 8px var(--c-botanical)); }
        }

        .emblem[data-emblem="nature"].active {
            animation: animNature 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animNature {
            0% { transform: scale(0.8); filter: drop-shadow(0 0 0 transparent); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 15px var(--c-nature)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 8px var(--c-nature)); }
        }

        .emblem[data-emblem="cities"].active {
            animation: animCities 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes animCities {
            0% { transform: translateY(20px) scale(0.8); opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            100% { transform: translateY(0) scale(1); opacity: 1; filter: drop-shadow(0 0 15px var(--c-cities)); }
        }

        .loading-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* --- Fade Out Overlay --- */
        .page-fade {
            position: fixed;
            inset: 0;
            background: var(--bg);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        .page-fade.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>

<script>
  (function() {
    const isMobile = window.innerWidth < 768 || screen.width < 768 || /Mobi|Android|iPhone/i.test(navigator.userAgent);
    if (isMobile) {
      const pageMap = {
        'index.html': 'mobile-site/index-mobile.html',
        'shop.html': 'mobile-site/shop-mobile.html',
        'library.html': 'mobile-site/library-mobile.html',
        'auth.html': 'mobile-site/auth-mobile.html',
        'checkout.html': 'mobile-site/checkout-mobile.html',
        'loading.html': 'mobile-site/loading-mobile.html'
      };
      const parts = window.location.pathname.split('/');
      const currentFile = parts[parts.length - 1] || 'index.html';
      const target = pageMap[currentFile] || pageMap['index.html'];
      window.location.replace(target + window.location.search + window.location.hash);
    }
  })();
</script>

            <div class="emblem" data-emblem="botanical"><svg class="svg-icon svg-lg sway-subtle" viewBox="0 0 24 24" style="color: #059669; width: 64px; height: 64px;"><path d="M7 20h10M12 20V10M12 10a4 4 0 0 1 8-4M12 14a4 4 0 0 0-8-4"/></svg></div>
            <div class="emblem" data-emblem="nature" style="color: #334155; display: inline-flex; align-items: center; justify-content: center;"><i data-lucide="mountain" class="lucide" style="width: 64px; height: 64px;"></i></div>
            <div class="emblem" data-emblem="cities" style="color: #7F00FF; display: inline-flex; align-items: center; justify-content: center;"><i data-lucide="landmark" class="lucide" style="width: 64px; height: 64px;"></i></div>
        </div>
        <div class="loading-text">Preparing Vault...</div>
    </div>

    <div class="page-fade" id="pageFade"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const authGate = document.getElementById('authGate');
            const authForm = document.getElementById('authForm');
            const emailInput = document.getElementById('emailInput');
            const loadingSequence = document.getElementById('loadingSequence');
            const pageFade = document.getElementById('pageFade');
            const emblems = document.querySelectorAll('.emblem');
            const loadingText = document.querySelector('.loading-text');

            const urlParams = new URLSearchParams(window.location.search);
            const planner = urlParams.get('planner');

            if (planner) {
                // Bypass auth gate if viewing a planner
                authGate.style.display = 'none';
                startPlannerLoading(planner);
            } else {
                // Check if already authenticated
                const existingEmail = localStorage.getItem('plannit_email') || localStorage.getItem('plannit_user_email');
                
                if (existingEmail) {
                    // If authenticated, jump straight to sequence
                    authGate.style.display = 'none';
                    localStorage.setItem('plannit_email', existingEmail);
                    localStorage.setItem('plannit_user_email', existingEmail);
                    startLoadingSequence();
                } else {
                    // If not authenticated, redirect to the new auth gateway
                    window.location.href = 'auth.html?mode=login';
                }
            }

            function startPlannerLoading(plannerSlug) {
                loadingSequence.classList.add('active');

                // Determine emblem mapping
                let targetEmblemName = 'summer'; // Default fallback
                let friendlyName = 'Summer Sun';
                
                if (plannerSlug.includes('summer')) {
                    targetEmblemName = 'summer';
                    friendlyName = 'Summer Sun';
                } else if (plannerSlug.includes('winter')) {
                    targetEmblemName = 'winter';
                    friendlyName = 'Winter Frost';
                } else if (plannerSlug.includes('autumn')) {
                    targetEmblemName = 'autumn';
                    friendlyName = 'Autumn Ember';
                } else if (plannerSlug.includes('spring')) {
                    targetEmblemName = 'spring';
                    friendlyName = 'Spring Bloom';
                } else if (plannerSlug.includes('botanical')) {
                    targetEmblemName = 'botanical';
                    friendlyName = 'Botanical';
                } else if (plannerSlug.includes('nature')) {
                    targetEmblemName = 'nature';
                    friendlyName = 'Nature';
                } else if (plannerSlug.includes('cities')) {
                    targetEmblemName = 'cities';
                    friendlyName = 'Capital Cities';
                }

                if (loadingText) {
                    loadingText.textContent = `Decrypting ${friendlyName} Vault...`;
                }

                // Hide all emblems except the target one
                emblems.forEach(emb => {
                    if (emb.getAttribute('data-emblem') === targetEmblemName) {
                        emb.style.display = 'block';
                        // Add active class after a tiny delay to trigger CSS keyframes
                        setTimeout(() => emb.classList.add('active'), 50);
                    } else {
                        emb.style.display = 'none';
                    }
                });

                 // Wait for emblem animation, then fade out and redirect
                 setTimeout(() => {
                     pageFade.classList.add('active');
                     setTimeout(() => {
                         const isLocalFile = window.location.protocol === 'file:';
                        const userEmail = localStorage.getItem('plannit_user_email');
                        if (!isLocalFile && userEmail) {
                            // Retrieve stored redemption token for this planner (if any)
                            const allTokens = JSON.parse(localStorage.getItem('plannit_tokens') || '{}');
                            const token = allTokens[plannerSlug] || '';
                            const tokenParam = token ? `&token=${encodeURIComponent(token)}` : '';

                            const sessionToken = localStorage.getItem('plannit_session_token') || '';
                            fetch(`https://plannit-backend-private.vercel.app/api/secure-gateway?email=${encodeURIComponent(userEmail)}&edition=${encodeURIComponent(plannerSlug)}${tokenParam}`, {
                                headers: {
                                    'Authorization': `Bearer ${sessionToken}`
                                }
                            })
                                .then(r => r.json())
                                .then(data => {
                                    if (data.success && data.signedUrl) {
                                        // A top-level navigation can't send an Authorization header, so the JWT
                                        // is passed as the single `token` query param the gateway falls back to.
                                        // Do NOT also append the legacy redemption tokenParam here — duplicate
                                        // `token=` keys parse to an array server-side and fail JWT validation (401).
                                        window.location.href = `https://plannit-backend-private.vercel.app/api/secure-gateway?email=${encodeURIComponent(userEmail)}&edition=${encodeURIComponent(plannerSlug)}&stream=true&token=${encodeURIComponent(sessionToken)}`;
                                    } else {
                                        window.location.href = `library.html?sync_needed=${encodeURIComponent(plannerSlug)}`;
                                    }
                                })
                                .catch(() => {
                                    window.location.href = `library.html?sync_needed=${encodeURIComponent(plannerSlug)}`;
                                });
                        } else if (!isLocalFile) {
                            window.location.href = 'library.html';
                        } else {
                            window.location.href = `../../planners/seasonal/dev-current/${plannerSlug}/index.html`;
                        }
                     }, 500);
                 }, 1800);
             }

            function startLoadingSequence() {
                loadingSequence.classList.add('active');

                let currentIndex = 0;
                
                function playNextEmblem() {
                    if (currentIndex > 0) {
                        emblems[currentIndex - 1].classList.remove('active');
                    }
                    
                    if (currentIndex < emblems.length) {
                        emblems[currentIndex].classList.add('active');
                        currentIndex++;
                        setTimeout(playNextEmblem, 250);
                    } else {
                        // Sequence finished
                        finishLoading();
                    }
                }

                // Start the sequence after a brief pause
                setTimeout(playNextEmblem, 300);
            }

            function finishLoading() {
                pageFade.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'library.html';
                }, 500);
            }
            
            // Initialize Lucide Icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  const isMobile = window.innerWidth < 768 || screen.width < 768 || /Mobi|Android|iPhone/i.test(navigator.userAgent);
  if (!isMobile) {
    const pageMap = {
      'index-mobile.html': '../index.html',
      'shop-mobile.html': '../shop.html',
      'library-mobile.html': '../library.html',
      'auth-mobile.html': '../auth.html',
      'checkout-mobile.html': '../checkout.html',
      'loading-mobile.html': '../loading.html'
    };
    const parts = window.location.pathname.split('/');
    const currentFile = parts[parts.length - 1] || 'index-mobile.html';
    const target = pageMap[currentFile] || pageMap['index-mobile.html'];
    window.location.replace(target + window.location.search + window.location.hash);
  }
</script>
<meta charset="UTF-8">
<title>Plannit — Mobile Account</title>
<link rel="icon" type="image/x-icon" href="../logo.svg">
<link rel="stylesheet" href="../style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; background:var(--cream); font-family:var(--font-sans); }
  .mobile-page { max-width:480px; margin:0 auto; background:var(--white); min-height:100vh; box-shadow:0 0 40px rgba(43,43,43,0.08); }

  .pnav-min { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--border-soft); position:sticky; top:0; z-index:50; background:var(--white); }
  .plogo { font-family:var(--font-display); font-weight:600; font-size:19px; color:var(--charcoal); text-decoration:none; }
  .back-ic { width:19px; height:19px; }

  .auth-wrap { padding:36px 20px 40px; display:flex; flex-direction:column; align-items:center; }
  .auth-mark { width:44px; height:44px; border-radius:12px; background:var(--forest); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .auth-mark svg { width:22px; height:22px; }

  .tabs-row { display:flex; gap:8px; margin-bottom:22px; background:var(--cream); border-radius:9999px; padding:4px; width:100%; max-width:280px; }
  .tab { flex:1; text-align:center; padding:8px 0; border-radius:9999px; font-size:12.5px; font-weight:700; color:var(--muted); }
  .tab.active { background:var(--forest); color:var(--white); }

  .auth-title { font-family:var(--font-display); font-weight:600; font-size:26px; color:var(--charcoal); margin:0 0 6px; text-align:center; }
  .auth-sub { font-size:12.5px; color:var(--muted); text-align:center; margin:0 0 26px; line-height:1.5; max-width:300px; }

  .field-group { width:100%; max-width:340px; display:flex; flex-direction:column; gap:16px; }
  .field label { display:block; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; border:1px solid var(--border-soft); border-radius:9999px; padding:12px 16px; font-size:13.5px; color:var(--charcoal); background:var(--white); font-family:var(--font-sans); }
  .field input::placeholder { color:#9E988C; }
  .field-row { display:flex; gap:10px; }
  .field-row .field { flex:1; }

  .forgot { align-self:flex-end; font-size:11.5px; color:var(--copper); font-weight:700; text-decoration:none; margin-top:-8px; }

  .btn-submit-m { width:100%; max-width:340px; margin-top:22px; padding:13px; border-radius:9999px; background:#3E5C76; color:var(--white); font-weight:700; font-size:13.5px; text-align:center; box-shadow:0 6px 16px rgba(62,92,118,.3); display:flex; align-items:center; justify-content:center; gap:8px; }

  .divider { display:flex; align-items:center; gap:12px; width:100%; max-width:340px; margin:24px 0; }
  .divider .line { flex:1; height:1px; background:var(--border-soft); }
  .divider span { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

  .btn-outline-m { width:100%; max-width:340px; padding:12px; border-radius:9999px; border:1px solid var(--border-soft); background:var(--white); color:var(--charcoal); font-weight:700; font-size:13px; text-align:center; display:flex; align-items:center; justify-content:center; gap:10px; }

  .auth-footnote { margin-top:26px; font-size:12px; color:var(--muted); text-align:center; }
  .auth-footnote a { color:var(--copper); font-weight:700; text-decoration:none; }
</style>
<style>
  :root {
     --charcoal: #2B2B2B;
     --copper: #C86B45;
     --muted: #6B6B6B;
     --cream: #F9F8F6;
     --white: #FFFFFF;
     --forest: #223C2B;
     --border-soft: rgba(43,43,43,0.1);
     --shadow-sm: 0 2px 8px rgba(43,43,43,0.06);
     --shadow-md: 0 8px 24px rgba(43,43,43,0.08);
     --shadow-xl: 0 20px 40px rgba(43,43,43,0.12);
     --font-sans: 'Inter', sans-serif;
     --font-display: 'Cormorant Garamond', serif;
     --bot-lavender: #AFA9EC;
     --season-summer: #E8A020;
     --season-winter: #378ADD;
  }
</style>
</head>
<body>
<div class="mobile-page">

  <div class="pnav-min">
    <a href="index-mobile.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
      <svg class="back-ic" viewBox="0 0 24 24" fill="none" stroke="#2B2B2B" stroke-width="1.9"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="index-mobile.html" class="plogo">Plannit</a>
    <div style="width:19px;"></div>
  </div>

  <div class="auth-wrap">
    <div class="auth-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>

    <div class="tabs-row">
      <div class="tab active">Log In</div>
      <div class="tab">Sign Up</div>
    </div>

    <h1 class="auth-title">Welcome back.</h1>
    <p class="auth-sub">Log in to sync your library and access purchases across every device.</p>

    <div class="field-group">
      <div class="field">
        <label>Email address</label>
        <input type="email" placeholder="your@email.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••••">
      </div>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <a href="shop-mobile.html" class="btn-submit-m" style="text-decoration:none; display:flex;">
      Log In
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

    <div class="divider"><div class="line"></div><span>or continue with</span><div class="line"></div></div>

    <a href="shop-mobile.html" class="btn-outline-m" style="text-decoration:none; display:flex;">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 0 0-9.82 6.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
      Continue with Google
    </a>

    <p class="auth-footnote">Don't have an account? <a href="#">Sign Up</a></p>
  </div>

</div>
</body>
</html>
